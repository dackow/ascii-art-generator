<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <style>
        body { font-family: sans-serif; margin: 2em; line-height: 1.5; }
        .form-group { margin-bottom: 1em; }
        label { display: block; margin-bottom: 0.5em; font-weight: bold; }
        input[type="text"], select { padding: 0.5em; width: 100%; max-width: 400px; box-sizing: border-box; }
        button { padding: 0.5em 1.5em; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        pre { background-color: #f8f9fa; padding: 1em; border: 1px solid #dee2e6; overflow-x: auto; font-family: monospace; white-space: pre; }
        .result-container { margin-top: 2em; }
    </style>
</head>
<body>
    <h1>ASCII Art Generator</h1>
    <form action="/" method="post">
        <div class="form-group">
            <label for="text">Enter Text:</label>
            <input type="text" id="text" name="text" value="{{ user_text }}" required placeholder="Type something...">
        </div>
        <div class="form-group">
            <label for="font">Select Font:</label>
            <select id="font" name="font">
                {% for font in ['standard', 'slant', 'shadow', 'block', 'bubble', 'digital'] %}
                <option value="{{ font }}" {% if selected_font == font %}selected{% endif %}>{{ font.capitalize() }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Generate ASCII Art</button>
    </form>

    {% if ascii_art %}
    <div class="result-container">
        <h2>Result:</h2>
        <pre>{{ ascii_art }}</pre>
    </div>
    {% endif %}
</body>
</html>
